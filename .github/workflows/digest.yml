name: Daily digest

on:
  schedule:
    # FALLBACK ONLY. The primary trigger is an external scheduler (cron-job.org)
    # that calls this workflow via the workflow_dispatch REST API at 08:00
    # America/Los_Angeles — dispatch events run on time, whereas GitHub `schedule`
    # events are throttled/delayed 1-3h. These cron lines stay as a safety net if
    # the external trigger ever fails. GitHub cron is UTC with no DST handling, so
    # fire at both 15:00 and 16:00 UTC; the once-per-day guard dedupes against the
    # external trigger so only ONE digest email is ever sent per day.
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force send now, bypassing the 8am / once-per-day guard (manual testing)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: yt-watcher-state
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # backstop: never hold the shared concurrency lock for the 6h default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Install Chromium for PDF rendering
        run: |
          python -m playwright install --with-deps chromium
          sudo apt-get install -y fonts-noto-color-emoji
      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALLOWLIST_SENDERS: ${{ secrets.ALLOWLIST_SENDERS }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
        run: |
          # Only an explicit manual force bypasses the guard. The external
          # cron-job.org trigger and the GitHub schedule fallback both run the
          # guarded path, so the once-per-day marker guarantees a single send.
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python watcher.py --mode digest --force
          else
            python watcher.py --mode digest
          fi
      - name: Commit summaries & state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "digest: update summaries & state"
          # Push with bounded retries. The shared concurrency group serializes the two
          # workflows, so a non-fast-forward is rare (a human push) — rebase, retry, and
          # fail loudly rather than swallowing a conflict and leaving state un-pushed
          # (which would re-send already-sent videos on the next run).
          for attempt in 1 2 3; do
            if git pull --rebase --autostash && git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push state after 3 attempts"
          exit 1
