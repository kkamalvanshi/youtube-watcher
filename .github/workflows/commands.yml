name: Command listener

on:
  schedule:
    # FALLBACK ONLY. Primary trigger is an external scheduler (cron-job.org) that
    # calls this workflow via the workflow_dispatch REST API every ~5 min — dispatch
    # runs on time, whereas GitHub `schedule` is throttled (this */15 actually fires
    # every 1-4h in practice). Command processing dedupes on email message-id, so
    # extra/overlapping triggers never send duplicate replies.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: yt-watcher-state
  cancel-in-progress: false

jobs:
  commands:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # backstop: never hold the shared concurrency lock for the 6h default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Process commands
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALLOWLIST_SENDERS: ${{ secrets.ALLOWLIST_SENDERS }}
        run: python watcher.py --mode commands
      - name: Commit channels & state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "commands: update channels & state"
          # Push with bounded retries; rebase + abort-on-conflict rather than swallowing
          # a conflict and leaving state un-pushed (which would re-process commands and
          # send duplicate replies on the next run).
          for attempt in 1 2 3; do
            if git pull --rebase --autostash && git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push state after 3 attempts"
          exit 1
